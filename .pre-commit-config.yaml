repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, boto3-stubs, types-PyYAML]
        args: [--strict]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --ext .ts,.tsx src/'
        language: system
        files: 'frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npx prettier --check src/'
        language: system
        files: 'frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
