[tool.ruff]
target-version = "py311"
line-length = 120
fix = true

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import ordering)
    "N",    # pep8-naming
    "D",    # pydocstyle (docstrings)
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
]
extend-select = ["D100", "D101", "D102", "D103"]

[tool.ruff.lint.per-file-ignores]
"infra/stacks/bush_ranger_stack.py" = ["E402"]
"tests/**/*.py" = ["S101", "D102", "D103", "E402"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["models", "services", "infra"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
exclude = ["infra/cdk\\.out/"]

[[tool.mypy.overrides]]
module = "aws_cdk.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "strands.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "strands_tools.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "mcp.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "boto3.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "botocore.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "services.agent.steering.*"
ignore_missing_imports = true
